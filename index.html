<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EOS - Coach Personnel</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #0f172a; 
            color: #f8fafc; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
        }
        header { 
            padding: 15px; 
            background: #1e293b; 
            text-align: center; 
            border-bottom: 2px solid #334155;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }
        #chat { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px;
        }
        .msg { 
            padding: 12px 16px; 
            border-radius: 12px; 
            max-width: 85%; 
            line-height: 1.5;
            word-wrap: break-word;
        }
        .user { 
            background: #3b82f6; 
            align-self: flex-end; 
            color: white; 
            border-bottom-right-radius: 2px;
        }
        .ai { 
            background: #334155; 
            align-self: flex-start; 
            border-bottom-left-radius: 2px;
        }
        #input-area { 
            display: flex; 
            padding: 20px; 
            background: #1e293b; 
            gap: 10px;
            border-top: 1px solid #334155;
        }
        input { 
            flex: 1; 
            padding: 12px; 
            border: none; 
            border-radius: 8px; 
            background: #334155; 
            color: white; 
            outline: none;
            font-size: 1rem;
        }
        button { 
            background: #10b981; 
            border: none; 
            padding: 12px 20px; 
            color: white; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header>
        <strong>EOS</strong> | Stratège Personnel
    </header>

    <div id="chat">
        <div class="msg ai">Bonjour Mattéo. Je suis Eos. Je connais tes objectifs : générer des revenus indépendants du marché calédonien. Comment allons-nous avancer aujourd'hui ?</div>
    </div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Parle à Eos...">
        <button onclick="sendMessage()">Action</button>
    </div>

    <script>
        // --- CONFIGURATION ---
        const API_KEY = "TA_CLE_API_ICI"; // Mets ta clé ici
        
        const systemInstruction = "Tu es Eos, coach stratégique de Mattéo. Ton but : l'aider à générer des revenus indépendants du marché de Nouvelle-Calédonie pour réinvestir. Tu es direct, expert en finance et business en ligne.";

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const chat = document.getElementById('chat');
            const text = input.value.trim();
            
            if (!text) return;

            chat.innerHTML += `<div class="msg user">${text}</div>`;
            input.value = "";
            chat.scrollTop = chat.scrollHeight;

            // URL CORRIGÉE : Version v1 et modèle gemini-pro
            const url = `https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${API_KEY}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ 
                            parts: [{ 
                                text: systemInstruction + "\n\nMattéo: " + text 
                            }] 
                        }]
                    })
                });

                const data = await response.json();

                if (data.error) {
                    chat.innerHTML += `<div class="msg ai" style="color:#ef4444;">Erreur : ${data.error.message}</div>`;
                } else if (data.candidates && data.candidates[0].content) {
                    const responseText = data.candidates[0].content.parts[0].text;
                    chat.innerHTML += `<div class="msg ai">${responseText}</div>`;
                } else {
                    chat.innerHTML += `<div class="msg ai">Eos a eu une absence, réessaie.</div>`;
                }
            } catch (e) {
                chat.innerHTML += `<div class="msg ai" style="color:#ef4444;">Problème de connexion.</div>`;
            }
            
            chat.scrollTop = chat.scrollHeight;
        }

        document.getElementById('user-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
