<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EOS - Mode Auto</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px; background: #1e293b; text-align: center; color: #10b981; font-weight: bold; border-bottom: 1px solid #334155; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px; border-radius: 12px; max-width: 85%; }
        .user { background: #3b82f6; align-self: flex-end; }
        .ai { background: #334155; align-self: flex-start; white-space: pre-wrap; }
        #input-area { display: flex; padding: 20px; background: #1e293b; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: none; font-size: 16px; }
        button { padding: 12px 20px; background: #10b981; color: white; border: none; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <header>EOS | RECHERCHE DE CANAL...</header>
    <div id="chat"><div class="msg ai">Analyse des modèles disponibles pour ta clé...</div></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Attends l'analyse..." disabled>
        <button id="btn" disabled>ACTION</button>
    </div>

    <script>
        var API_KEY = localStorage.getItem('EOS_KEY');
        if (!API_KEY) {
            API_KEY = prompt("Colle ta clé API Gemini :");
            if (API_KEY) localStorage.setItem('EOS_KEY', API_KEY);
        }

        var chat = document.getElementById('chat');
        var input = document.getElementById('user-input');
        var btn = document.getElementById('btn');
        var validModel = "";

        // ÉTAPE 1 : Scanner les modèles disponibles
        async function findValidModel() {
            try {
                const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models?key=' + API_KEY);
                const data = await response.json();
                
                // On cherche un modèle qui supporte "generateContent"
                const model = data.models.find(m => m.supportedGenerationMethods.includes('generateContent'));
                
                if (model) {
                    validModel = model.name; // C'est le nom complet (ex: models/gemini-1.5-flash)
                    document.querySelector('header').innerText = "EOS | PRÊT (" + model.displayName + ")";
                    chat.innerHTML += `<div class="msg ai">Canal trouvé : ${model.displayName}. On peut commencer, Mattéo.</div>`;
                    input.disabled = false;
                    btn.disabled = false;
                    input.placeholder = "Parle à Eos...";
                } else {
                    chat.innerHTML += `<div class="msg ai" style="color:red;">Aucun modèle compatible trouvé pour cette clé.</div>`;
                }
            } catch (e) {
                chat.innerHTML += `<div class="msg ai" style="color:red;">Erreur de connexion. Active ton VPN.</div>`;
            }
        }

        // ÉTAPE 2 : Envoyer le message
        btn.onclick = async function() {
            var text = input.value.trim();
            if (!text || !validModel) return;

            chat.innerHTML += `<div class="msg user">${text}</div>`;
            input.value = "";
            chat.scrollTop = chat.scrollHeight;

            try {
                const response = await fetch('https://generativelanguage.googleapis.com/v1beta/' + validModel + ':generateContent?key=' + API_KEY, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Tu es Eos, coach business de Mattéo. Réponds à : " + text }] }] })
                });
                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                chat.innerHTML += `<div class="msg ai">${aiText}</div>`;
            } catch (e) {
                chat.innerHTML += `<div class="msg ai" style="color:red;">Erreur lors de la réponse.</div>`;
            }
            chat.scrollTop = chat.scrollHeight;
        };

        findValidModel();
    </script>
</body>
</html>
