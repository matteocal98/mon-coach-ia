<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EOS - Coach Stratégique</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #f8fafc; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px; background: #1e293b; text-align: center; border-bottom: 2px solid #334155; color: #10b981; font-weight: bold; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 16px; border-radius: 12px; max-width: 85%; line-height: 1.5; word-wrap: break-word; }
        .user { background: #3b82f6; align-self: flex-end; }
        .ai { background: #334155; align-self: flex-start; white-space: pre-wrap; }
        #input-area { display: flex; padding: 20px; background: #1e293b; gap: 10px; border-top: 1px solid #334155; }
        input { flex: 1; padding: 12px; border-radius: 8px; background: #334155; color: white; border: none; outline: none; }
        button { background: #10b981; border: none; padding: 12px 20px; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <header>EOS | COACHING MATTÉO</header>
    <div id="chat">
        <div class="msg ai">Système prêt. Mattéo, si c'est la première fois, colle ta clé API dans la fenêtre qui s'affiche.</div>
    </div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Parle à Eos..." autocomplete="off">
        <button id="send-btn">ACTION</button>
    </div>

    <script>
        // Utilisation de guillemets simples pour éviter les erreurs de token ':'
        var API_KEY = localStorage.getItem('EOS_KEY');

        if (!API_KEY) {
            var inputKey = prompt('Colle ta clé API Gemini ici :');
            if (inputKey) {
                API_KEY = inputKey.trim();
                localStorage.setItem('EOS_KEY', API_KEY);
            }
        }

        var chat = document.getElementById('chat');
        var userInput = document.getElementById('user-input');
        var sendBtn = document.getElementById('send-btn');

        async function sendMessage() {
            var text = userInput.value.trim();
            if (!text || !API_KEY) return;

            chat.innerHTML += '<div class="msg user">' + text + '</div>';
            userInput.value = '';
            chat.scrollTop = chat.scrollHeight;

            // Construction de l'URL avec concaténation classique
            var url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=' + API_KEY;

            try {
                var response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ 
                            parts: [{ 
                                text: 'Tu es Eos, coach business de Mattéo. Aide-le à générer des revenus hors-Calédonie. Réponds à : ' + text 
                            }] 
                        }]
                    })
                });

                var data = await response.json();

                if (data.error) {
                    chat.innerHTML += '<div class="msg ai" style="color:#f87171;">Google dit : ' + data.error.message + '</div>';
                } else if (data.candidates && data.candidates[0].content) {
                    var aiText = data.candidates[0].content.parts[0].text;
                    chat.innerHTML += '<div class="msg ai">' + aiText + '</div>';
                }
            } catch (e) {
                chat.innerHTML += '<div class="msg ai" style="color:#f87171;">Erreur réseau. Active ton VPN.</div>';
            }
            chat.scrollTop = chat.scrollHeight;
        }

        sendBtn.onclick = function() {
            if (userInput.value.toUpperCase() === 'RESET') {
                localStorage.removeItem('EOS_KEY');
                location.reload();
                return;
            }
            sendMessage();
        };

        userInput.onkeypress = function(e) {
            if (e.key === 'Enter') {
                if (userInput.value.toUpperCase() === 'RESET') {
                    localStorage.removeItem('EOS_KEY');
                    location.reload();
                    return;
                }
                sendMessage();
            }
        };
    </script>
</body>
</html>
