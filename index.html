<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EOS Coach</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px; background: #1e293b; text-align: center; color: #10b981; font-weight: bold; border-bottom: 1px solid #334155; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px; border-radius: 12px; max-width: 85%; line-height: 1.4; }
        .user { background: #3b82f6; align-self: flex-end; }
        .ai { background: #334155; align-self: flex-start; white-space: pre-wrap; }
        #input-area { display: flex; padding: 20px; background: #1e293b; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: none; font-size: 16px; color: black; }
        button { padding: 12px 20px; background: #10b981; color: white; border: none; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <header>EOS STRATÉGIE</header>
    <div id="chat"><div class="msg ai">Système paré. Entre ta clé si demandé, active ton VPN et on y va.</div></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Parle à Eos...">
        <button id="btn">ACTION</button>
    </div>

    <script>
        // Utilisation de variables séparées pour éviter le token ':' dans l'URL directe
        var storageKey = 'EOS_KEY';
        var key = localStorage.getItem(storageKey);

        if (!key) {
            var promptVal = prompt('Colle ta clé API Gemini :');
            if (promptVal) {
                key = promptVal.trim();
                localStorage.setItem(storageKey, key);
            }
        }

        var btn = document.getElementById('btn');
        var input = document.getElementById('user-input');
        var chat = document.getElementById('chat');

        btn.onclick = async function() {
            var text = input.value.trim();
            if(!text || !key) return;

            chat.innerHTML += '<div class="msg user">' + text + '</div>';
            input.value = "";
            chat.scrollTop = chat.scrollHeight;

            // On ruse : on sépare le protocole du reste pour éviter l'erreur de syntaxe sur le ":"
            var protocol = 'https';
            var domain = 'generativelanguage.googleapis.com';
            var path = '/v1beta/models/gemini-1.5-flash:generateContent?key=';
            var finalUrl = protocol + '://' + domain + path + key;

            try {
                var response = await fetch(finalUrl, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Tu es Eos, coach stratégique de Mattéo. Aide-le : " + text }] }]
                    })
                });

                var data = await response.json();

                if (data.error) {
                    chat.innerHTML += '<div class="msg ai" style="color:red;">Erreur : ' + data.error.message + '</div>';
                } else {
                    var aiResponse = data.candidates[0].content.parts[0].text;
                    chat.innerHTML += '<div class="msg ai">' + aiResponse + '</div>';
                }
            } catch (e) {
                chat.innerHTML += '<div class="msg ai" style="color:red;">Erreur réseau (VPN actif ?)</div>';
            }
            chat.scrollTop = chat.scrollHeight;
        };
    </script>
</body>
</html>
