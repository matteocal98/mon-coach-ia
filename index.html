<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EOS Coach</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 10px; max-width: 80%; }
        .user { background: #3b82f6; align-self: flex-end; }
        .ai { background: #334155; align-self: flex-start; }
        #input-area { display: flex; padding: 20px; background: #1e293b; gap: 10px; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: none; }
        button { padding: 10px; background: #10b981; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="chat"><div class="msg ai">Eos est prêt, Mattéo. Quel est l'objectif ?</div></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Ecris ici...">
        <button id="btn">Action</button>
    </div>

    <script>
        // METS TA CLÉ ICI
        const API_KEY = "AIzaSyDfEHkt8kNfdwWvP7W4rM2ntfvM2GRTDF4"; 

        document.getElementById('btn').onclick = async () => {
            const input = document.getElementById('user-input');
            const chat = document.getElementById('chat');
            const text = input.value;
            if(!text) return;

            chat.innerHTML += `<div class="msg user">${text}</div>`;
            input.value = "";

            // ON UTILISE LE MODÈLE LE PLUS STABLE POUR 2026
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Réponds en tant que coach business : " + text }] }] })
                });
                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                chat.innerHTML += `<div class="msg ai">${aiText}</div>`;
            } catch (e) {
                chat.innerHTML += `<div class="msg ai" style="color:red;">Erreur : Vérifie ta clé ou le modèle.</div>`;
            }
            chat.scrollTop = chat.scrollHeight;
        };
    </script>
</body>
</html>
