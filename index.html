<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EOS Assistant</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px; background: #1e293b; text-align: center; color: #10b981; font-weight: bold; border-bottom: 1px solid #334155; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px; border-radius: 12px; max-width: 85%; }
        .user { background: #3b82f6; align-self: flex-end; }
        .ai { background: #334155; align-self: flex-start; white-space: pre-wrap; }
        #input-area { display: flex; padding: 20px; background: #1e293b; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: none; font-size: 16px; }
        button { padding: 12px 20px; background: #10b981; color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <header>EOS | STRATÉGIE MATTÉO</header>
    <div id="chat"><div class="msg ai">VPN Actif ? Clé configurée ? Je t'écoute.</div></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Parle à Eos...">
        <button id="btn">ACTION</button>
    </div>

    <script>
        // RÉCUPÉRATION SÉCURISÉE DE LA CLÉ
        let API_KEY = localStorage.getItem('EOS_KEY');

        if (!API_KEY) {
            API_KEY = prompt("Veuillez coller votre nouvelle clé API Gemini (AIza...) :");
            if (API_KEY) {
                localStorage.setItem('EOS_KEY', API_KEY);
            }
        }

        const btn = document.getElementById('btn');
        const input = document.getElementById('user-input');
        const chat = document.getElementById('chat');

        btn.onclick = async () => {
            const text = input.value.trim();
            if(!text || !API_KEY) return;

            chat.innerHTML += `<div class="msg user">${text}</div>`;
            input.value = "";
            chat.scrollTop = chat.scrollHeight;

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Tu es Eos, coach business stratégique de Mattéo. Aide-le à générer des revenus hors-Calédonie. Réponds à : " + text }] }]
                    })
                });

                const data = await response.json();

                if (data.error) {
                    if(data.error.message.includes("leaked")) {
                        localStorage.removeItem('EOS_KEY');
                        alert("Cette clé est grillée. Supprime-la sur AI Studio et crée-en une nouvelle.");
                    }
                    chat.innerHTML += `<div class="msg ai" style="color:#f87171;">Google dit : ${data.error.message}</div>`;
                } else {
                    const aiText = data.candidates[0].content.parts[0].text;
                    chat.innerHTML += `<div class="msg ai">${aiText}</div>`;
                }
            } catch (e) {
                chat.innerHTML += `<div class="msg ai" style="color:#f87171;">Erreur réseau. Active ton VPN.</div>`;
            }
            chat.scrollTop = chat.scrollHeight;
        };
    </script>
</body>
</html>
