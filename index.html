<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EOS - Coach Personnel</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0f172a; 
            color: #f8fafc; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
        }
        header { padding: 15px; background: #1e293b; text-align: center; border-bottom: 2px solid #334155; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        .msg { margin-bottom: 15px; padding: 12px 16px; border-radius: 12px; max-width: 85%; line-height: 1.4; }
        .user { background: #3b82f6; align-self: flex-end; color: white; }
        .ai { background: #334155; align-self: flex-start; }
        #input-area { display: flex; padding: 20px; background: #1e293b; gap: 10px; }
        input { 
            flex: 1; padding: 12px; border: none; border-radius: 8px; 
            background: #334155; color: white; outline: none;
        }
        button { 
            background: #10b981; border: none; padding: 12px 20px; 
            color: white; border-radius: 8px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>
    <header>
        <strong>EOS</strong> - Coach Stratégique
    </header>

    <div id="chat">
        <div class="msg ai">Bonjour Mattéo. Je suis prêt. Quel est notre premier levier pour générer des revenus hors-Calédonie aujourd'hui ?</div>
    </div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Écris ici...">
        <button onclick="sendMessage()">Action</button>
    </div>

    <script>
        // REMPLACE BIEN ICI PAR TA CLÉ
        const API_KEY = "AIzaSyDTmjKaBnoL-YMhejx2iu3w75RArFPrOoc"; 
        const systemInstruction = "Tu es Eos, coach stratégique de Mattéo. Ton but : l'aider à générer des revenus indépendants du marché de Nouvelle-Calédonie pour réinvestir. Tu es direct, expert en finance et business en ligne.";

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const chat = document.getElementById('chat');
            const text = input.value.trim();
            
            if (!text) return;

            // Affichage message utilisateur
            chat.innerHTML += `<div class="msg user">${text}</div>`;
            input.value = "";
            chat.scrollTop = chat.scrollHeight;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: systemInstruction + "\n\nQuestion de Mattéo: " + text }] }]
                    })
                });

                const data = await response.json();
                const responseText = data.candidates[0].content.parts[0].text;

                chat.innerHTML += `<div class="msg ai">${responseText}</div>`;
            } catch (e) {
                chat.innerHTML += `<div class="msg ai" style="color:#ef4444;">Désolé, j'ai eu un problème de connexion à mon cerveau (Vérifie ta clé API).</div>`;
                console.error(e);
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
