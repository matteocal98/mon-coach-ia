<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EOS - Coach Stratégique</title>
    <style>
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: #0f172a; 
            color: #f8fafc; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
        }
        header { 
            padding: 15px; 
            background: #1e293b; 
            text-align: center; 
            border-bottom: 2px solid #334155;
            font-weight: bold;
            font-size: 1.2rem;
            color: #10b981;
        }
        #chat { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px;
        }
        .msg { 
            padding: 12px 16px; 
            border-radius: 12px; 
            max-width: 85%; 
            line-height: 1.5;
            word-wrap: break-word;
        }
        .user { 
            background: #3b82f6; 
            align-self: flex-end; 
            color: white; 
            border-bottom-right-radius: 2px;
        }
        .ai { 
            background: #334155; 
            align-self: flex-start; 
            border-bottom-left-radius: 2px;
            white-space: pre-wrap; /* Garde la mise en forme de l'IA */
        }
        #input-area { 
            display: flex; 
            padding: 20px; 
            background: #1e293b; 
            gap: 10px;
            border-top: 1px solid #334155;
        }
        input { 
            flex: 1; 
            padding: 12px; 
            border: none; 
            border-radius: 8px; 
            background: #334155; 
            color: white; 
            outline: none;
            font-size: 1rem;
        }
        button { 
            background: #10b981; 
            border: none; 
            padding: 12px 20px; 
            color: white; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer;
        }
        button:active { background: #059669; }
    </style>
</head>
<body>

    </div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Parle à Eos..." autocomplete="off">
        <button onclick="sendMessage()">Action</button>
    </div>
