<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EOS - Coach Stratégique</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #f8fafc; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px; background: #1e293b; text-align: center; border-bottom: 2px solid #334155; color: #10b981; font-weight: bold; letter-spacing: 1px; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 16px; border-radius: 12px; max-width: 85%; line-height: 1.5; word-wrap: break-word; font-size: 15px; }
        .user { background: #3b82f6; align-self: flex-end; color: white; border-bottom-right-radius: 2px; }
        .ai { background: #334155; align-self: flex-start; border-bottom-left-radius: 2px; white-space: pre-wrap; }
        #input-area { display: flex; padding: 20px; background: #1e293b; gap: 10px; border-top: 1px solid #334155; }
        input { flex: 1; padding: 12px; border: none; border-radius: 8px; background: #334155; color: white; outline: none; font-size: 16px; }
        button { background: #10b981; border: none; padding: 12px 20px; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #059669; }
    </style>
</head>
<body>

    <header>EOS | COACHING MATTÉO</header>

    <div id="chat">
        <div class="msg ai">Système prêt. Mattéo, si c'est la première fois, je vais te demander ta clé API. Une fois configurée, n'oublie pas d'activer ton VPN. Quel est notre plan ?</div>
    </div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Parle à Eos..." autocomplete="off">
        <button id="send-btn">ACTION</button>
    </div>

    <script>
        // --- GESTION DE LA CLÉ API ---
        let API_KEY = localStorage.getItem('EOS_KEY');

        if (!API_KEY) {
            const inputKey = prompt("Veuillez coller votre clé API Gemini (AIza...) :");
            if (inputKey && inputKey.trim() !== "") {
                API_KEY = inputKey.trim();
                localStorage.setItem('EOS_KEY', API_KEY);
            }
        }

        const chat = document.getElementById('chat');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text || !API_KEY) return;

            // Affichage message utilisateur
            chat.innerHTML += `<div class="msg user">${text}</div>`;
            userInput.value = "";
            chat.scrollTop = chat.scrollHeight;

            // Modèle 1.5 Flash (le plus stable pour les quotas gratuits)
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ 
                            parts: [{ 
                                text: "Tu es Eos, coach stratégique de Mattéo. Ton but : l'aider à générer des revenus indépendants du marché de Nouvelle-Calédonie. Tu es direct et expert. Réponds à : " + text 
                            }] 
                        }]
                    })
                });

                const data = await response.json();

                if (data.error) {
                    if (data.error.message.includes("API key") || data.error.message.includes("leaked")) {
                        chat.innerHTML += `<div class="msg ai" style="color:#f87171;">Erreur : Clé invalide ou bannie. Tape 'RESET' pour changer de clé.</div>`;
                    } else {
                        chat.innerHTML += `<div class="msg ai" style="color:#f87171;">Google dit : ${data.error.message}</div>`;
                    }
                } else if (data.candidates && data.candidates[0].content) {
                    const aiText = data.candidates[0].content.parts[0].text;
                    chat.innerHTML += `<div class="msg ai">${aiText}</div>`;
                }
