<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EOS Assistant</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #f8fafc; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px; background: #1e293b; text-align: center; border-bottom: 2px solid #334155; color: #10b981; font-weight: bold; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 16px; border-radius: 12px; max-width: 85%; line-height: 1.5; word-wrap: break-word; }
        .user { background: #3b82f6; align-self: flex-end; color: white; border-bottom-right-radius: 2px; }
        .ai { background: #334155; align-self: flex-start; border-bottom-left-radius: 2px; white-space: pre-wrap; }
        #input-area { display: flex; padding: 20px; background: #1e293b; gap: 10px; border-top: 1px solid #334155; }
        input { flex: 1; padding: 12px; border: none; border-radius: 8px; background: #334155; color: white; outline: none; font-size: 16px; }
        button { background: #10b981; border: none; padding: 12px 20px; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <header>EOS | STRATÉGIE MATTÉO</header>
    
    <div id="chat">
        <div class="msg ai">Connexion établie. Mattéo, si tu vois ce message, le code est chargé. N'oublie pas ton VPN (Proton VPN) pour contourner le blocage régional.</div>
    </div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Parle à Eos..." autocomplete="off">
        <button id="send-btn">ACTION</button>
    </div>

    <script>
        // Gestion de la clé via stockage local
        var storageName = 'EOS_ACCESS_KEY';
        var apiKey = localStorage.getItem(storageName);

        if (!apiKey) {
            var inputKey = prompt('Configuration : Colle ta nouvelle clé API Gemini :');
            if (inputKey) {
                apiKey = inputKey.trim();
                localStorage.setItem(storageName, apiKey);
            }
        }

        var chatBox = document.getElementById('chat');
        var inputField = document.getElementById('user-input');
        var btnSend = document.getElementById('send-btn');

        async function callEos() {
            var message = inputField.value.trim();
            if (!message || !apiKey) return;

            // Affichage utilisateur
            chatBox.innerHTML += '<div class="msg user">' + message + '</div>';
            inputField.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            // NOM DU MODÈLE CORRIGÉ : On utilise la version technique précise
            var modelName = 'gemini-1.5-flash-001';
            var endpoint = 'https://generativelanguage.googleapis.com/v1beta/models/' + modelName + ':generateContent?key=' + apiKey;

            try {
                var response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ 
                            parts: [{ 
                                text: "Tu es Eos, coach business stratégique. Ton but est d'aider Mattéo à générer des revenus hors-Calédonie. Réponds à : " + message 
                            }] 
                        }]
                    })
                });

                var result = await response.json();

                if (result.error) {
                    // Si l'erreur persiste, on l'affiche clairement
                    chatBox.innerHTML += '<div class="msg ai" style="color:#f87171;">Google dit : ' + result.error.message + '</div>';
                } else if (result.candidates && result.candidates[0].content) {
                    var responseText = result.candidates[0].content.parts[0].text;
                    chatBox.innerHTML += '<div class="msg ai">' + responseText + '</div>';
                }
            } catch (err) {
                chatBox.innerHTML += '<div class="msg ai" style="color:#f87171;">Erreur de connexion. Vérifie ton VPN.</div>';
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        btnSend.onclick = function() {
            if (inputField.value.toUpperCase() === 'RESET') {
                localStorage.removeItem(storageName);
                location.reload();
                return;
            }
            callEos();
        };

        inputField.onkeypress = function(e) {
            if (e.key === 'Enter') {
                if (inputField.value.toUpperCase() === 'RESET') {
                    localStorage.removeItem(storageName);
                    location.reload();
                    return;
                }
                callEos();
            }
        };
    </script>
</body>
</html>
