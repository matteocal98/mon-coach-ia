<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EOS Assistant</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #f8fafc; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px; background: #1e293b; text-align: center; border-bottom: 2px solid #334155; color: #10b981; font-weight: bold; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px; border-radius: 12px; max-width: 85%; line-height: 1.5; }
        .user { background: #3b82f6; align-self: flex-end; }
        .ai { background: #334155; align-self: flex-start; white-space: pre-wrap; }
        #input-area { display: flex; padding: 20px; background: #1e293b; gap: 10px; }
        input { flex: 1; padding: 12px; border: none; border-radius: 8px; background: #334155; color: white; outline: none; }
        button { background: #10b981; border: none; padding: 12px 20px; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <header>EOS STRATÉGIE</header>
    <div id="chat"><div class="msg ai">Recherche du meilleur canal de communication... Mattéo, assure-toi que ton VPN est sur 'USA' ou 'France'.</div></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Parle à Eos..." autocomplete="off">
        <button id="send-btn">ACTION</button>
    </div>

    <script>
        var storageName = 'EOS_ACCESS_KEY';
        var apiKey = localStorage.getItem(storageName);

        if (!apiKey) {
            var inputKey = prompt('Configuration : Colle ta clé API Gemini :');
            if (inputKey) {
                apiKey = inputKey.trim();
                localStorage.setItem(storageName, apiKey);
            }
        }

        var chatBox = document.getElementById('chat');
        var inputField = document.getElementById('user-input');
        var btnSend = document.getElementById('send-btn');

        // On définit une liste de secours au cas où
        var modelList = ['gemini-1.5-flash', 'gemini-1.5-pro', 'gemini-pro', 'gemini-1.0-pro'];
        var currentModelIndex = 0;

        async function callEos() {
            var message = inputField.value.trim();
            if (!message || !apiKey) return;

            chatBox.innerHTML += '<div class="msg user">' + message + '</div>';
            inputField.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            await tryRequest(message);
        }

        async function tryRequest(message) {
            var modelName = modelList[currentModelIndex];
            var endpoint = 'https://generativelanguage.googleapis.com/v1beta/models/' + modelName + ':generateContent?key=' + apiKey;

            try {
                var response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Tu es Eos, coach business de Mattéo. Réponds à : " + message }] }]
                    })
                });

                var result = await response.json();

                if (result.error) {
                    // Si le modèle n'est pas trouvé, on essaie le suivant dans la liste
                    if (result.error.message.includes("not found") && currentModelIndex < modelList.length - 1) {
                        console.log("Modèle " + modelName + " non trouvé, essai du suivant...");
                        currentModelIndex++;
                        await tryRequest(message);
                    } else {
                        chatBox.innerHTML += '<div class="msg ai" style="color:#f87171;">Google dit : ' + result.error.message + '</div>';
                    }
                } else if (result.candidates) {
                    var responseText = result.candidates[0].content.parts[0].text;
                    chatBox.innerHTML += '<div class="msg ai">' + responseText + '</div>';
                }
            } catch (err) {
                chatBox.innerHTML += '<div class="msg ai" style="color:#f87171;">Erreur réseau. VPN actif ?</div>';
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        btnSend.onclick = function() {
            if (inputField.value.toUpperCase() === 'RESET') {
                localStorage.removeItem(storageName);
                location.reload();
                return;
            }
            callEos();
        };

        inputField.onkeypress = function(e) {
            if (e.key === 'Enter') {
                if (inputField.value.toUpperCase() === 'RESET') {
                    localStorage.removeItem(storageName);
                    location.reload();
                    return;
                }
                callEos();
            }
        };
    </script>
</body>
</html>
